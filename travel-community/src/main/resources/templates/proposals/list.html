<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Поиск путешествий')}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container">
    <div th:replace="~{fragments/header :: flash-messages}"></div>

    <h2>Доступные туры и путешествия</h2>

    <div class="categories-bar">
        <span th:each="category : ${categories}" class="category-tag"
              th:title="${category.description}" th:text="${category.name}"></span>
    </div>

    <div class="proposals-grid">
        <div th:each="proposal : ${proposals}" class="card">
            <img th:src="${proposal.mainImageUrl != null ? proposal.mainImageUrl : '/images/default-trip.jpg'}" alt="Изображение тура">
            <div class="card-content">
                <h3><a th:href="@{/proposals/{id}(id=${proposal.id})}" th:text="${proposal.title}"></a></h3>
                <p class="location">📍 <span th:text="${proposal.location}"></span></p>
                <p class="dates">📅 <span th:text="${proposal.startDate}"></span> — <span th:text="${proposal.endDate}"></span></p>
                <p class="price">Цена: <strong th:text="${proposal.price} + ' ₽'"></strong></p>
                <div class="spots">
                    Свободно мест: <span th:text="${proposal.maxParticipants - proposal.currentParticipants}"></span>
                    из <span th:text="${proposal.maxParticipants}"></span>
                </div>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(proposals)}" class="empty-state">Туров пока нет. Будьте первым!</p>
    </div>
</main>
</body>
</html>
