<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('404 — Не найдено')}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="error-page-body">
<div class="error-container">
    <div class="error-code">404</div>
    <h1>Страница не найдена</h1>
    <p class="error-description" th:text="${errorMessage != null ? errorMessage : 'Запрашиваемый ресурс не существует.'}"></p>
    <div class="error-actions">
        <a th:href="@{/proposals}" class="btn btn-primary">Вернуться на главную</a>
    </div>
</div>
</body>
</html>
