<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Чат по поездке')}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container">
    <a th:href="@{/proposals/{id}(id=${proposalId})}" class="btn btn-primary">← К деталям тура</a>

    <div class="chat-container">
        <div class="chat-header">
            <h3>Диалог по туру</h3>
        </div>

        <div class="chat-messages" id="chat-messages-container"
             th:data-current-user-id="${currentUserId}">
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-message-input" placeholder="Введите сообщение..." autocomplete="off">
            <button id="chat-send-btn" class="btn btn-primary">Отправить</button>
        </div>
    </div>
</main>

<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        initChatRoom(/*[[${proposalId}]]*/, /*[[${receiverId}]]*/);
    });
</script>
</body>
</html>
