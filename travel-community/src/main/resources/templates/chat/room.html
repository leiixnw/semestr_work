<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чат по поездке</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="container">
    <a th:href="@{/proposals/{id}(id=${proposalId})}" class="btn btn-primary">← К деталям тура</a>

    <div class="chat-container">
        <div class="chat-header">
            <h3>Диалог по туру</h3>
        </div>

        <div class="chat-messages" id="chat-messages-container" th:data-current-user-id="${currentUserId}">
        </div>

        <div class="chat-input-area">
            <input type="text" id="chat-message-input" placeholder="Введите сообщение..." autocomplete="off">
            <button id="chat-send-btn" class="btn btn-primary">Отправить</button>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        initChatRoom(/*[[${proposalId}]]*/, /*[[${receiverId}]]*/);
    });
</script>
</body>
</html>
