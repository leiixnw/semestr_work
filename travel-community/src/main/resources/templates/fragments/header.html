<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${pageTitle} + ' — TravelCommunity'">TravelCommunity</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:fragment="navbar">
    <header>
        <div class="nav-container">
            <a th:href="@{/proposals}" class="logo">TravelCommunity</a>
            <nav>
                <div sec:authorize="isAuthenticated()" class="nav-auth">
                    <span class="welcome">Привет, <span sec:authentication="name">User</span>!</span>
                    <a th:href="@{/proposals}" class="btn">Туры</a>
                    <a th:href="@{/proposals/create}" sec:authorize="hasRole('ORGANIZER')" class="btn btn-create">Создать тур</a>
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-logout">Выйти</button>
                    </form>
                </div>
                <div sec:authorize="isAnonymous()" class="nav-guest">
                    <a th:href="@{/login}" class="btn">Войти</a>
                    <a th:href="@{/signup}" class="btn btn-signup">Регистрация</a>
                </div>
            </nav>
        </div>
    </header>
</nav>
<div th:fragment="flash-messages">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
</div>
</body>
</html>
