<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему — TravelCommunity</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2>Авторизация</h2>
        <p class="auth-subtitle">Войдите, чтобы планировать путешествия</p>

        <div th:if="${param.error}" class="alert alert-danger">
            Неверный Email или пароль. Попробуйте снова.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            Вы успешно вышли из системы.
        </div>

        <div th:if="${param.registered}" class="alert alert-success">
            Регистрация прошла успешно! Теперь вы можете войти.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label th:for="username">Email адрес:</label>
                <input type="email" id="username" name="email" required placeholder="example@mail.ru"/>
            </div>

            <div class="form-group">
                <label th:for="password">Пароль:</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"/>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Войти</button>
        </form>

        <div class="auth-footer">
            Нет аккаунта? <a th:href="@{/signup}">Зарегистрироваться</a>
        </div>
    </div>
</div>

</body>
</html>
