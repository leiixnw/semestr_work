<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — TravelCommunity</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2>Создать аккаунт</h2>
        <p class="auth-subtitle">Присоединяйтесь к сообществу путешественников</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/signup}" th:object="${signUpForm}" method="post">

            <div class="form-group">
                <label for="fullName">Полное имя (ФИО):</label>
                <input type="text" th:field="*{fullName}" id="fullName" required placeholder="Иванов Иван Иванович"/>
                <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error-message"></p>
            </div>

            <div class="form-group">
                <label for="username">Имя пользователя (Никнейм):</label>
                <input type="text" th:field="*{username}" id="username" required placeholder="ivan_traveler"/>
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error-message"></p>
            </div>

            <div class="form-group">
                <label for="email">Электронная почта (Email):</label>
                <input type="email" th:field="*{email}" id="email" required placeholder="ivan@example.com"/>
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></p>
            </div>

            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" th:field="*{password}" id="password" required placeholder="Минимум 6 символов"/>
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></p>
            </div>

            <div class="form-group">
                <label for="role">Кто вы?</label>
                <select th:field="*{role}" id="role" class="form-control" required>
                    <option value="TRAVELER">Хочу искать туры и путешествовать</option>
                    <option value="ORGANIZER">Я гид / Организатор туров</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
        </form>

        <div class="auth-footer">
            Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
        </div>
    </div>
</div>

</body>
</html>
