spring:
  application:
    name: travel-community

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travel_db}
    username: ${SPRING_DATASOURCE_USERNAME:travel_user}
    password: ${SPRING_DATASOURCE_PASSWORD:travel_password}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true

  cache:
    type: redis

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  minio:
    url: http://localhost:9000
    accessKey: minioadmin
    secretKey: minioadmin
    bucketName: travel-images

logging:
  level:
    oris.travelcommunity: INFO
    org.springframework.security: DEBUG